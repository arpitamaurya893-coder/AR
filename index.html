<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI VR Teacher for Disabled Students</title>
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
<script>
AFRAME.registerComponent('teacher-talk',{
 init:function(){
   const lessons=[
     "Welcome! Today we learn the Solar System.",
     "Earth revolves around the Sun in 365 days.",
     "The Moon revolves around Earth.",
     "Great job! Keep learning."];
   let i=0;
   const board=document.querySelector('#lesson');
   const teacherEntity=document.querySelector('#ai-teacher');
   const speakLesson=()=>{
     board.setAttribute('value', lessons[i]);
     if('speechSynthesis' in window){
       speechSynthesis.cancel();
       speechSynthesis.speak(new SpeechSynthesisUtterance(lessons[i]));
     }
   };
   const nextLesson=()=>{
     speakLesson();
     i=(i+1)%lessons.length;
   };
   teacherEntity.addEventListener('click', nextLesson);
   teacherEntity.addEventListener('mouseenter', () => {
     teacherEntity.setAttribute('scale', '1.1 1.1 1.1');
   });
   teacherEntity.addEventListener('mouseleave', () => {
     teacherEntity.setAttribute('scale', '1 1 1');
   });
   nextLesson();
   setInterval(nextLesson, 9000);
 }
});
</script>
</head>
<body>
<a-scene teacher-talk>
  <!-- Camera Rig -->
<a-entity id="rig" position="0 0 4">
  <a-camera>
    <a-cursor
      fuse="false"
      raycaster="objects: .clickable">
    </a-cursor>
  </a-camera>

  <!-- Left Meta Quest 3S Controller -->
  <a-entity
    laser-controls="hand: left"
    raycaster="objects: .clickable"
    line="color: #00FFFF">
  </a-entity>

  <!-- Right Meta Quest 3S Controller -->
  <a-entity
    laser-controls="hand: right"
    raycaster="objects: .clickable"
    line="color: #FF0000">
  </a-entity>
</a-entity>
<a-sky color="#87CEEB"></a-sky>
<a-entity light="type:ambient;intensity:0.8"></a-entity>
<a-entity light="type:directional;intensity:0.9" position="2 6 2"></a-entity>
<a-plane rotation="-90 0 0" width="40" height="40" color="#8fd18f"></a-plane>

<a-box position="0 2 -10" width="7" height="3.5" depth="0.1" color="#184d1c"></a-box>
<a-text id="lesson" value="Loading..." color="#FFF" align="center" width="6" position="0 2 -9.94"></a-text>

<a-entity position="0 0 -5">
<a-sphere position="0 2 0" radius=".35" color="#FFD39B">
<a-animation attribute="rotation" dur="3000" repeat="indefinite" direction="alternate" to="0 15 0"></a-animation>
</a-sphere>
<a-cylinder position="0 1 0" radius=".3" height="1.2" color="#1565C0"></a-cylinder>
<a-cylinder position="-.45 1.2 0" radius=".06" height=".8" rotation="0 0 90" color="#FFD39B">
<a-animation attribute="rotation" dur="1500" repeat="indefinite" direction="alternate" to="0 0 130"></a-animation>
</a-cylinder>
<a-cylinder position=".45 1.2 0" radius=".06" height=".8" rotation="0 0 90" color="#FFD39B">
<a-animation attribute="rotation" dur="1500" repeat="indefinite" direction="alternate" to="0 0 50"></a-animation>
</a-cylinder>
<a-cylinder position="-.12 .2 0" radius=".07" height="1" color="#222"></a-cylinder>
<a-cylinder position=".12 .2 0" radius=".07" height="1" color="#222"></a-cylinder>
</a-entity>

<a-box position="-3 .5 -3" width="1" height="1" depth="1" color="#795548"></a-box>
<a-box position="0 .5 -3" width="1" height="1" depth="1" color="#795548"></a-box>
<a-box position="3 .5 -3" width="1" height="1" depth="1" color="#795548"></a-box>

<a-circle position="-5 1 -6" radius=".8" color="#2196F3"></a-circle>
<a-text value="Wheelchair Access" position="-5 2 -6" align="center" width="3"></a-text>

<a-entity id="ai-teacher" class="clickable" position="2 0 -7" rotation="0 20 0" scale="1 1 1">
  <a-sphere position="0 1.6 0" radius="0.5" color="#FFD39B"></a-sphere>
  <a-box position="0 0.5 0" width="0.9" height="1.4" depth="0.4" color="#1565C0"></a-box>
  <a-cylinder position="-0.6 0.7 0" radius="0.1" height="0.9" rotation="0 0 10" color="#FFD39B"></a-cylinder>
  <a-cylinder position="0.6 0.7 0" radius="0.1" height="0.9" rotation="0 0 -10" color="#FFD39B"></a-cylinder>
  <a-text value="AI Teacher" position="0 2.5 0" align="center" width="2" color="#000"></a-text>
  <a-text value="Click to ask me" position="0 -0.5 0" align="center" width="2.5" color="#FFF"></a-text>
</a-entity>

<a-text value="AI PERSONAL VR TEACHER" position="0 4 -8" color="blue" align="center" width="10"></a-text>

</a-scene>
</body>
</html>
